name: Update Creative KPIs Dashboard

on:
  push:
    paths:
      - 'generate.py'   # auto-runs whenever the script is updated
  schedule:
    - cron: '1 0 * * 1'   # 12:01am UTC every Monday
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backfill start date (YYYY-MM-DD). Leave empty for normal rolling window.'
        required: false
        default: ''
      end_date:
        description: 'Backfill end date (YYYY-MM-DD). Leave empty for normal rolling window.'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "slack_sdk>=3.19,<4" requests

      - name: Generate dashboard
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Dashboard update $(date +'%Y-%m-%d')"
          git push
