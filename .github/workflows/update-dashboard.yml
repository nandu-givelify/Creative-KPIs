name: Update Creative KPIs Dashboard

on:
  schedule:
    - cron: '0 8 1 * *'   # 8 AM UTC on the 1st of every month
  workflow_dispatch:        # Also allows manual "Run workflow" button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install slack_sdk requests

      - name: Generate dashboard
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: python generate.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Dashboard update $(date +'%Y-%m-%d')"
          git push
